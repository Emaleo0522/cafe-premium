<!doctype html>
<html lang="es" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Theme color (mobile browser chrome) -->
    <meta name="theme-color" content="#1A1A1A" />

    <!-- Apple Web App meta tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Favicons -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />

    <!-- Primary meta -->
    <title>TORRË — Café de Origen | Café de Especialidad Tostado Artesanal</title>
    <meta name="description" content="Café de especialidad tostado en lotes pequeños. Directo de fincas en Colombia, Etiopía y Guatemala a tu mesa. Envío en 48h. Sin suscripción." />
    <link rel="canonical" href="https://torre-cafe.com/" />

    <!-- Google Search Console verification (placeholder) -->
    <meta name="google-site-verification" content="REPLACE_WITH_GSC_TOKEN" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="TORRË — Café de Origen | Café de Especialidad Tostado Artesanal" />
    <meta property="og:description" content="Café de especialidad tostado en lotes pequeños. Directo de fincas en Colombia, Etiopía y Guatemala a tu mesa. Envío en 48h. Sin suscripción." />
    <meta property="og:image" content="https://torre-cafe.com/images/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="TORRË — Café de Especialidad Tostado Artesanal" />
    <meta property="og:url" content="https://torre-cafe.com/" />
    <meta property="og:site_name" content="TORRË" />
    <meta property="og:locale" content="es_AR" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="TORRË — Café de Origen | Café de Especialidad Tostado Artesanal" />
    <meta name="twitter:description" content="Café de especialidad tostado en lotes pequeños. Directo de fincas en Colombia, Etiopía y Guatemala. Envío en 48h." />
    <meta name="twitter:image" content="https://torre-cafe.com/images/og-image.png" />
    <meta name="twitter:image:alt" content="TORRË — Café de Especialidad Tostado Artesanal" />

    <!-- JSON-LD: Organization (static — para crawlers sin JS) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "TORRË",
      "alternateName": "Torre Café de Origen",
      "url": "https://torre-cafe.com",
      "logo": "https://torre-cafe.com/logo/logo-full.svg",
      "description": "Café de especialidad tostado artesanal en lotes pequeños. Origen directo en Colombia, Etiopía y Guatemala.",
      "foundingDate": "2022",
      "sameAs": [
        "https://www.instagram.com/torrecafe",
        "https://www.facebook.com/torrecafe"
      ],
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "customer service",
        "availableLanguage": "Spanish",
        "email": "hola@torre-cafe.com"
      },
      "address": {
        "@type": "PostalAddress",
        "addressCountry": "AR"
      }
    }
    </script>

    <!-- JSON-LD: WebSite (static — para crawlers sin JS) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "TORRË",
      "url": "https://torre-cafe.com",
      "description": "Café de especialidad tostado artesanal en lotes pequeños. Origen directo en Colombia, Etiopía y Guatemala.",
      "inLanguage": "es-AR"
    }
    </script>

    <!-- Preconnect (fonts + CDN) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- DNS prefetch -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />

    <!-- Preload LCP image (hero desktop) -->
    <link rel="preload" as="image" href="/images/hero.png" media="(min-width: 768px)" />
    <link rel="preload" as="image" href="/images/hero-mobile.png" media="(max-width: 767px)" />

    <!-- Web App Manifest -->
    <link rel="manifest" href="/manifest.json" />
  </head>
  <body>
    <noscript>Este sitio requiere JavaScript para funcionar correctamente.</noscript>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
